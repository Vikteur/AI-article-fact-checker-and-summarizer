<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Analyzer — Claude API Demo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        header p {
            color: #555;
            font-size: 0.95rem;
        }

        .badge {
            display: inline-block;
            background: #e8f4fd;
            color: #1a6fa8;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 0.6rem;
        }

        .input-section {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            transition: border-color 0.15s;
        }

        textarea:focus {
            outline: none;
            border-color: #1a6fa8;
        }

        textarea::placeholder {
            color: #aaa;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            background: #1a6fa8;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.65rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover:not(:disabled) {
            background: #155d8e;
        }

        button:disabled {
            background: #94b8d0;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: #555;
            font-size: 0.9rem;
        }

        .spinner.visible {
            display: flex;
        }

        .spinner-ring {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-top-color: #1a6fa8;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results */
        .results {
            display: none;
            gap: 1rem;
        }

        .results.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 600px) {
            .results.visible {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .card-icon {
            font-size: 1.1rem;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 700;
        }

        .card-body {
            font-size: 0.875rem;
            line-height: 1.65;
            color: #333;
            white-space: pre-wrap;
        }

        .card.fact-check .card-header { color: #c0392b; }
        .card.summary .card-header { color: #1a6fa8; }

        .error-msg {
            display: none;
            background: #fdf0ee;
            border: 1px solid #f1bab5;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            color: #c0392b;
            font-size: 0.875rem;
            margin-top: 0.75rem;
        }

        .error-msg.visible { display: block; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="badge">Multi-Agent · Claude API Demo</div>
        <h1>Article Analyzer</h1>
        <p>Paste any article. Two Claude agents run in parallel — one checks facts, one summarizes.</p>
    </header>

    <div class="input-section">
        <label for="article">Article text</label>
        <textarea
            id="article"
            placeholder="Paste a news article, blog post, or any text you want to analyze…"
        ></textarea>

        <div class="actions">
            <button id="analyzeBtn" onclick="analyze()">Analyze</button>
            <div class="spinner" id="spinner">
                <div class="spinner-ring"></div>
                <span>Analyzing with Claude…</span>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="results" id="results">
        <div class="card fact-check">
            <div class="card-header">
                <span class="card-icon">🔍</span>
                <h2>Fact Check</h2>
            </div>
            <div class="card-body" id="factCheckContent"></div>
        </div>
        <div class="card summary">
            <div class="card-header">
                <span class="card-icon">📋</span>
                <h2>Summary</h2>
            </div>
            <div class="card-body" id="summaryContent"></div>
        </div>
    </div>
</div>

<script>
    async function analyze() {
        const article = document.getElementById('article').value.trim();
        if (!article) {
            showError('Please paste an article before clicking Analyze.');
            return;
        }

        setLoading(true);
        hideError();
        hideResults();

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ article })
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || `Server error: ${response.status}`);
            }

            const data = await response.json();
            showResults(data);
        } catch (err) {
            showError('Something went wrong: ' + err.message);
        } finally {
            setLoading(false);
        }
    }

    function setLoading(loading) {
        document.getElementById('analyzeBtn').disabled = loading;
        document.getElementById('spinner').classList.toggle('visible', loading);
    }

    function showResults(data) {
        document.getElementById('factCheckContent').textContent = data.incorrectFacts;
        document.getElementById('summaryContent').textContent = data.summary;
        document.getElementById('results').classList.add('visible');
    }

    function hideResults() {
        document.getElementById('results').classList.remove('visible');
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('visible');
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('article').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze();
    });
</script>
</body>
</html>
